# render.yaml — инфраструктура как код для Render
# Один репо, два сервиса: API (web) + Bot (worker)
# Документация: https://render.com/docs/blueprint-spec

services:

  # ─────────────────────────────────────────────
  # 1. REST API для Mini App (FastAPI)
  # ─────────────────────────────────────────────
  - type: web
    name: vyud-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true

    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"

      # ── Telegram ──────────────────────────────
      - key: TELEGRAM_BOT_TOKEN
        sync: false

      # ── OpenAI / LlamaCloud ───────────────────
      - key: OPENAI_API_KEY
        sync: false
      - key: LLAMA_CLOUD_API_KEY
        sync: false

      # ── Supabase (service_role key!) ──────────
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false

      # ── API security ──────────────────────────
      # Список ключей через запятую, например: key1,key2
      - key: API_KEYS
        sync: false

      # ── Webhook secret (придумай любую строку) ──
      - key: WEBHOOK_SECRET
        sync: false
